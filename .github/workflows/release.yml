name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-release:
    name: Build DMG and publish release
    runs-on: macos-14
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build DMG
        run: npm run tauri:build:dmg -- --ci

      - name: Capture artifact metadata
        id: artifact
        shell: bash
        run: |
          dmg_path="$(find src-tauri/target/release/bundle/dmg -maxdepth 1 -name '*.dmg' -print -quit)"
          if [[ -z "$dmg_path" ]]; then
            echo "No DMG artifact found" >&2
            exit 1
          fi
          shasum -a 256 "$dmg_path" | tee dmg.sha256
          echo "dmg_path=$dmg_path" >> "$GITHUB_OUTPUT"
          echo "dmg_name=$(basename "$dmg_path")" >> "$GITHUB_OUTPUT"
          echo "sha256=$(awk '{print $1}' dmg.sha256)" >> "$GITHUB_OUTPUT"

      - name: Publish prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          prerelease: true
          fail_on_unmatched_files: true
          files: |
            ${{ steps.artifact.outputs.dmg_path }}
            dmg.sha256
          body: |
            Automated prerelease build for ${{ inputs.tag || github.ref_name }}.

            Artifact:
            - ${{ steps.artifact.outputs.dmg_name }}
            - SHA-256: `${{ steps.artifact.outputs.sha256 }}`

            Notes:
            - This DMG is unsigned and not notarized.
            - Real `/etc/hosts` administrator-write flows still require manual packaged-app validation before promoting to a production release.
