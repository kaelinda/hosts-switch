name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-release:
    name: Build DMG and publish release
    runs-on: macos-14
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build DMG
        run: npm run tauri:build:dmg -- --ci

      - name: Verify macOS app bundle
        run: npm run verify:bundle

      - name: Verify DMG contents
        run: npm run verify:dmg

      - name: Verify release version metadata
        shell: bash
        run: |
          version="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")"
          dmg_path="src-tauri/target/release/bundle/dmg/Hosts Switch_${version}_aarch64.dmg"
          release_asset_path="src-tauri/target/release/bundle/dmg/Hosts.Switch_${version}_aarch64.dmg"
          HOSTS_SWITCH_DMG_PATH="$dmg_path" HOSTS_SWITCH_RELEASE_ASSET_PATH="$release_asset_path" npm run verify:release-version
        env:
          HOSTS_SWITCH_RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

      - name: Verify manual validation template
        run: npm run verify:manual-validation

      - name: Verify manual validation result
        run: npm run verify:manual-result

      - name: Test manual result recorder
        run: npm run record:manual-result:self-test

      - name: Verify manual recording help
        run: npm run verify:manual-recording-help

      - name: Verify manual readiness preflight
        run: npm run verify:manual-readiness

      - name: Test manual readiness preflight
        run: npm run verify:manual-readiness:self-test

      - name: Test manual validation preparation
        run: npm run prepare:manual-validation:self-test

      - name: Capture artifact metadata
        id: artifact
        shell: bash
        run: |
          version="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")"
          dmg_path="src-tauri/target/release/bundle/dmg/Hosts Switch_${version}_aarch64.dmg"
          release_asset_path="src-tauri/target/release/bundle/dmg/Hosts.Switch_${version}_aarch64.dmg"
          if [[ ! -f "$dmg_path" ]]; then
            echo "Expected DMG artifact not found at $dmg_path" >&2
            exit 1
          fi
          cp "$dmg_path" "$release_asset_path"
          shasum -a 256 "$release_asset_path" | tee dmg.sha256
          echo "dmg_path=$release_asset_path" >> "$GITHUB_OUTPUT"
          echo "dmg_name=$(basename "$release_asset_path")" >> "$GITHUB_OUTPUT"
          echo "sha256=$(awk '{print $1}' dmg.sha256)" >> "$GITHUB_OUTPUT"

      - name: Publish prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          prerelease: true
          fail_on_unmatched_files: true
          files: |
            ${{ steps.artifact.outputs.dmg_path }}
            dmg.sha256
          body: |
            ## 中文版本说明

            这是 Hosts Switch 的 macOS 预发布构建，用于验证 Tauri + React 版 hosts 切换工具。

            本版本重点：
            - 支持 macOS 状态栏菜单直接切换 hosts 节点，并支持按分组停用全部节点。
            - 使用 Hosts Switch managed block 写入 `/etc/hosts`，保留块外原有内容。
            - Apply 和状态栏切换共用同一条管理员授权写入路径，写入成功后才保存激活状态。
            - 启用 hosts 内容校验，非法 IP/hostname 会在写入前被拦截。
            - 支持 JSON 配置导入/导出、登录项开关、全局快捷键打开编辑器、最近 hosts 备份恢复。
            - 当当前 `/etc/hosts` 或最近备份为空时，默认阻止应用/恢复，避免把异常空 hosts 状态写回系统。

            使用前请注意：
            - 该 DMG 未签名、未公证，首次打开可能需要在 macOS 安全设置中确认。
            - 真实 `/etc/hosts` 管理员写入、状态栏切换授权/取消回滚、登录项、全局快捷键、备份恢复仍需按仓库中的 manual validation checklist 在真实 macOS 会话中验证。

            ## English Summary

            Automated prerelease build for ${{ inputs.tag || github.ref_name }}.

            Artifact:
            - ${{ steps.artifact.outputs.dmg_name }}
            - SHA-256: `${{ steps.artifact.outputs.sha256 }}`

            Notes:
            - This DMG is unsigned and not notarized.
            - Real `/etc/hosts` administrator-write flows still require manual packaged-app validation before promoting to a production release.
